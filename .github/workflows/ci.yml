name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  python_quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install lightweight dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest websockets
      - name: Lint (ruff)
        run: |
          ruff check .
      - name: Tests (pytest)
        env:
          PYTHONPATH: .
        run: |
          pytest -q
      - name: Python syntax check
        run: |
          python -m compileall -q backend ingest

  ui_syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: JS syntax check
        run: |
          node -c ui/src/main.js
          node -c ui/src/settings.js

      - name: Frontend build step (static copy)
        run: |
          cd ui
          npm ci
          npm run build-frontend

  swift_build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build MeetingBuddySettings
        run: |
          cd native/MeetingBuddySettings
          swift build -c release
      - name: Build MeetingBuddyShell
        run: |
          cd native/MeetingBuddyShell
          swift build -c release
      - name: Build MeetingBuddyHUD
        run: |
          cd native/MeetingBuddyHUD
          swift build -c release

  rust_quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust fmt (Tauri)
        run: |
          cd ui/src-tauri
          cargo fmt --check
      - name: Rust clippy (Tauri)
        run: |
          cd ui/src-tauri
          export TAURI_CONFIG="$(cat tauri.conf.ci.json)"
          cargo clippy --all-targets --all-features -- -D warnings

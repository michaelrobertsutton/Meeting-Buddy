name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci_gate:
    name: CI gate (opt-in)
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
      reason: ${{ steps.gate.outputs.reason }}
    steps:
      - id: gate
        uses: actions/github-script@v8
        with:
          script: |
            const event = context.eventName;
            if (event === 'workflow_dispatch') {
              core.setOutput('run', 'true');
              core.setOutput('reason', 'workflow_dispatch');
              return;
            }

            // For pushes to main, always run.
            if (event === 'push') {
              core.setOutput('run', 'true');
              core.setOutput('reason', 'push');
              return;
            }

            // For PRs, only run if explicitly opted in via label.
            const number = context.payload.pull_request?.number;
            if (!number) {
              core.setOutput('run', 'false');
              core.setOutput('reason', 'no-pr-number');
              return;
            }

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              per_page: 100,
            });

            const names = new Set(labels.map(l => l.name));
            const optedIn = names.has('ci:run');

            core.setOutput('run', optedIn ? 'true' : 'false');
            core.setOutput('reason', optedIn ? 'label:ci:run' : 'missing-label:ci:run');

  python_quality:
    needs: ci_gate
    if: needs.ci_gate.outputs.run == 'true'

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install lightweight dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest websockets
      - name: Lint (ruff)
        run: |
          ruff check .
      - name: Tests (pytest)
        env:
          PYTHONPATH: .
        run: |
          pytest -q
      - name: Python syntax check
        run: |
          python -m compileall -q backend ingest

  ui_syntax:
    needs: ci_gate
    if: needs.ci_gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: JS syntax check
        run: |
          node -c ui/src/main.js
          node -c ui/src/settings.js

      - name: Frontend build step (static copy)
        run: |
          cd ui
          npm ci
          npm run build-frontend

  swift_build:
    needs: ci_gate
    if: needs.ci_gate.outputs.run == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build MeetingBuddySettings
        run: |
          cd native/MeetingBuddySettings
          swift build -c release
      - name: Build MeetingBuddyShell
        run: |
          cd native/MeetingBuddyShell
          swift build -c release
      - name: Build MeetingBuddyHUD
        run: |
          cd native/MeetingBuddyHUD
          swift build -c release

  rust_quality:
    needs: ci_gate
    if: needs.ci_gate.outputs.run == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust fmt (Tauri)
        run: |
          cd ui/src-tauri
          cargo fmt --check
      - name: Rust clippy (Tauri)
        env:
          TAURI_CONFIG: '{"bundle":{"active":false,"externalBin":[]}}'
        run: |
          cd ui/src-tauri
          cargo clippy --all-targets --all-features -- -D warnings
